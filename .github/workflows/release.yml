name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write  # Required for attestation signing
      attestations: write  # Required for publishing attestations

    # Third-party / external actions are pinned to a commit SHA (not a mutable
    # major tag) because this job holds id-token + attestations write scope.
    # Dependabot's github-actions ecosystem reads the `# vX.Y.Z` trailer and
    # bumps both the SHA and the comment via a reviewed PR.
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Build, test, and enforce Jacoco coverage gate. `verify` is required (not `package`)
    # because jacoco:check is bound to the verify phase.
    - name: Build with Maven
      run: mvn clean verify

    # Extract version from git tag instead of running Maven
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    # Generate build provenance attestation
    - name: Attest build provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: 'target/Firefly-*.jar'

    # Upload JAR and CycloneDX SBOMs (XML + JSON) to GitHub Releases.
    # The SBOMs document the dependency tree so consumers can audit transitive
    # deps without unpacking the jar.
    - name: Upload release assets
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        files: |
          target/Firefly-*.jar
          target/bom.xml
          target/bom.json
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
