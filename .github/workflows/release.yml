name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # upload assets to the release
      id-token: write       # required for build-provenance attestation
      attestations: write   # required to publish the attestation

    # Third-party / external actions are pinned to a commit SHA (not a mutable major tag) because
    # this job holds id-token + attestations write scope. Dependabot's github-actions ecosystem
    # reads the `# vX.Y.Z` trailer and bumps both the SHA and the comment via a reviewed PR.
    steps:
    # Block mode: fail the build on any egress outside this allowlist. The list is exactly the
    # workflow-specific hosts (Sigstore for the attestation + the three Maven repos + GitHub
    # API/git/upload + the Modrinth API for publishing); GitHub Actions runtime endpoints
    # (*.actions.githubusercontent.com, *.blob.core.windows.net, the OIDC token host) are allowed
    # by harden-runner's baseline.
    - name: Harden runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: block
        allowed-endpoints: >
          api.github.com:443
          api.modrinth.com:443
          fulcio.sigstore.dev:443
          github.com:443
          rekor.sigstore.dev:443
          repo.codemc.io:443
          repo.maven.apache.org:443
          repo.papermc.io:443
          uploads.github.com:443

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Tag convention is vX.Y.Z; strip the leading 'v' so the Maven version + artifact stay clean.
    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

    # Pin the build to the tag so the released jar always matches it, even if pom.xml wasn't bumped.
    - name: Set project version from tag
      run: mvn -B -ntp versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

    # `verify` (not `package`) enforces the JaCoCo coverage gate before anything ships.
    - name: Build and verify
      run: mvn -B -ntp clean verify

    - name: Generate checksum
      run: |
        cd target
        sha256sum "Firefly-${{ steps.version.outputs.VERSION }}.jar" \
          > "Firefly-${{ steps.version.outputs.VERSION }}.jar.sha256"

    # Build-provenance attestation — lets consumers verify a downloaded jar came from this repo's
    # release workflow via `gh attestation verify <jar> --repo GooberCraft/Firefly`.
    - name: Attest build provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: 'target/Firefly-*.jar'

    # Attach the jar, its SHA-256 checksum, and both CycloneDX SBOMs to the GitHub Release.
    - name: Upload release assets
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        files: |
          target/Firefly-*.jar
          target/Firefly-*.jar.sha256
          target/bom.xml
          target/bom.json
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Publish the shaded jar to Modrinth (best-effort: continue-on-error keeps a Modrinth hiccup from
    # failing the GitHub release, which is the source of truth). Same actively-maintained action used
    # by the StormtrooperX release. Pinned to a commit SHA — Dependabot reads the `# vX.Y.Z` trailer.
    # `project` is the immutable base62 project ID via the MODRINTH_PROJECT_ID repo variable (the
    # API wants the ID, not the slug). dependencies declares packetevents (its project ID) as required.
    - name: Publish to Modrinth
      uses: cloudnode-pro/modrinth-publish@8dc596b20b94959bf244180235d90729d05a674f # v2.4.1
      continue-on-error: true
      with:
        token: ${{ secrets.MODRINTH_TOKEN }}
        project: ${{ vars.MODRINTH_PROJECT_ID }}
        version: ${{ steps.version.outputs.VERSION }}
        name: Firefly ${{ steps.version.outputs.VERSION }}
        channel: ${{ github.event.release.prerelease && 'beta' || 'release' }}
        changelog: ${{ github.event.release.body }}
        loaders: |-
          paper
          spigot
          folia
        game-versions: |-
          1.21.6
          1.21.7
          1.21.8
          1.21.9
          1.21.10
          1.21.11
          26.1
          26.1.1
          26.1.2
        files: target/Firefly-${{ steps.version.outputs.VERSION }}.jar
        dependencies: |-
          [{ "project_id": "HYKaKraK", "dependency_type": "required" }]
