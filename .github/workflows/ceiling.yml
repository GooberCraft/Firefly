name: Ceiling compat

# Forward-compatibility gate. The default build (build.yml) targets the 1.21.6 floor; this runs the
# full test suite against the newest supported build (the "ceiling") so a forward-incompatible change
# can't merge unnoticed. Kept as its own workflow on purpose — it is not part of the build matrix.
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ceiling:
    name: Ceiling compat (26.1.2 API)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    # Network + runtime security monitoring for the runner (audit: observe-only, no egress blocked).
    - name: Harden runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@v7

    # 26.x requires Java 25, and the 26.1.2 paper-api is Java 25 bytecode, so the compile target is
    # raised to 25 here (the default build stays on the Java 21 floor).
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: 'temurin'
        cache: maven

    # Full verify (compile + tests + coverage gate) against the ceiling, overriding the floor
    # coordinates from pom.xml: paper-api -> 26.1.2 stable build, MockBukkit -> mockbukkit-v26.1.2,
    # compile target -> Java 25. Versions are pinned (not floating) for deterministic runs; bump them
    # by hand when the supported ceiling moves. SBOM is skipped (only release.yml needs it).
    - name: Build, test, and verify against ceiling API
      run: >
        mvn -B -ntp -nsu clean verify
        -Dpaper.api.version=26.1.2.build.70-stable
        -Dmockbukkit.artifact=mockbukkit-v26.1.2
        -Dmockbukkit.version=4.113.2
        -Djava.version=25
        -Dcyclonedx.skip=true
