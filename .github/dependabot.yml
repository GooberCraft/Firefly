# Dependabot configuration for automatic dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain dependencies for Maven
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "maven"
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      # paper-api major bumps are Minecraft platform jumps (e.g. 1.21 -> 26.1) that
      # require deliberate testing and a coordinated Java/packetevents update — they
      # break the pinned build, so they are handled manually. Minor/patch bumps are
      # still proposed automatically.
      - dependency-name: "io.papermc.paper:paper-api"
        update-types: ["version-update:semver-major"]
    # Group minor and patch updates together
    groups:
      test-dependencies:
        patterns:
          - "org.junit.jupiter:*"
          - "org.mockito:*"
          - "org.mockbukkit.mockbukkit:*"
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "org.junit.jupiter:*"
          - "org.mockito:*"
          - "org.mockbukkit.mockbukkit:*"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
